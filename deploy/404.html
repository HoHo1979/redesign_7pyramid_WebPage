<body>
  <h1>Oops! Page Not Found</h1>
  <p>We can't seem to find the page you're looking for.</p>
  <p>Don't worry, we'll redirect you to our wine list in <span id="timer" class="timer">5</span> seconds.</p>
  <p>If you're not redirected, <a href="https://wine.7pyramid.com/wine_list.html">click here</a>.</p>

  <script>
    let timeLeft = 5;
    const timerElement = document.getElementById('timer');
    const interval = setInterval(() => {
      timeLeft--;
      timerElement.textContent = timeLeft;
      if (timeLeft <= 0) {
        clearInterval(interval);
      }
    }, 1000);
