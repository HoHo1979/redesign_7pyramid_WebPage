    html {

    /* Wine Card Hover Effects */
    .wine-card {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .wine-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 20px 40px rgba(0,0,0,0.2) !important;
    }

    /* Country Flag Animations */
    .country-flag {
      animation: pulse 2s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      100% { transform: scale(1.1); }
    }

    /* Navigation Dropdown */
    .nav-dropdown {
      opacity: 0;
      transform: translateY(-10px);
      transition: all 0.3s ease;
      pointer-events: none;
    }

    .nav-dropdown.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    /* Theme Coordination Variables */
    :root {
      --wine-app-primary: #9c27b0;
      --wine-app-secondary: #e1bee7;
      --wine-app-accent: #f9abff;
      --transition-speed: 0.3s;
    }

    /* Ensure theme coordination between landing page and Flutter app */
    .dark {
      --theme-transition: color 0.3s ease, background-color 0.3s ease, border-color 0.3s ease;
    }

    .light {
      --theme-transition: color 0.3s ease, background-color 0.3s ease, border-color 0.3s ease;
    }

    /* Mobile Navigation Styles */
    @media (max-width: 768px) {
      /* Hide desktop navigation */
      #desktop-nav {
        display: none !important;
      }

      /* Show mobile navigation */
      #mobile-nav {
        display: flex !important;
      }

      /* Mobile menu active states */
      #mobile-menu-overlay.active {
        opacity: 1 !important;
        visibility: visible !important;
      }

      #mobile-menu-overlay.active #mobile-menu {
        transform: translateX(0) !important;
      }

      /* Mobile navigation link hover */
      .mobile-nav-link:hover {
        background: var(--md-sys-color-primary-container) !important;
        color: var(--md-sys-color-primary) !important;
      }

      /* Wine grid mobile layout */
      .wine-grid {
        grid-template-columns: 1fr !important;
        gap: 20px !important;
      }

      /* Hamburger menu animation */
      #mobile-menu-toggle.active {
        background: var(--md-sys-color-primary-container) !important;
        color: var(--md-sys-color-primary) !important;
      }
    }

    @media (max-width: 480px) {
      /* Extra small mobile adjustments */
      #mobile-menu {
        width: 95vw !important;
        padding: 20px 15px !important;
      }

      .wine-card {
        padding: 20px !important;
      }
